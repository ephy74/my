<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ephy Chat Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Custom utility for clean mobile scrolling channels */
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex justify-center items-center font-sans overflow-hidden">

  <div id="app-view" class="w-full h-full flex relative transition-all duration-300">
    
    <aside id="sidebar-container" class="w-full md:w-80 bg-slate-800 border-r border-slate-700 flex flex-col h-full flex-shrink-0 absolute md:relative z-20 transition-transform duration-300 translate-x-0">
      <div class="p-4 border-b border-slate-700 flex flex-col gap-3">
        <div class="flex items-center justify-between gap-2">
          <div class="flex items-center gap-3 overflow-hidden">
            <label class="relative cursor-pointer group flex-shrink-0">
              <div id="user-avatar-placeholder" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-bold uppercase text-sm border-2 border-indigo-400 overflow-hidden">
                U
              </div>
              <input type="file" id="avatar-file-input" class="hidden" accept="image/*">
            </label>
            <div class="truncate">
              <h3 id="current-user-display" class="font-bold text-indigo-400 text-sm truncate">...</h3>
              <p class="text-[10px] text-slate-400">Acting Session User</p>
            </div>
          </div>
          <button id="logout-btn" class="text-xs bg-slate-700 hover:bg-rose-600 px-2.5 py-1.5 rounded-lg transition flex-shrink-0 cursor-pointer">Exit</button>
        </div>

        <div class="bg-slate-900/60 p-2 rounded-lg border border-slate-700/50">
          <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-1">🎭 Switch Persona (Test Messaging):</label>
          <select id="identity-sandbox-selector" class="w-full bg-slate-800 border border-slate-600 rounded px-2 py-1 text-xs text-slate-200 focus:outline-none focus:border-indigo-500">
            <option value="usr-me">ephrem74 (You)</option>
            <option value="usr-1">husendawit4</option>
            <option value="usr-2">alex_designer</option>
          </select>
        </div>
      </div>

      <div class="p-3 bg-slate-800/60 border-b border-slate-700 space-y-2">
        <details class="text-xs text-slate-400 group">
          <summary class="cursor-pointer font-semibold text-indigo-400 select-none hover:text-indigo-300">👥 Create Group Chat</summary>
          <div class="mt-2 space-y-2 pt-1">
            <input id="group-name-input" type="text" placeholder="Group Name..." class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1 focus:outline-none text-white text-xs">
            <input id="group-members-input" type="text" placeholder="Invite usernames (comma separated)..." class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1 focus:outline-none text-white text-xs">
            <button id="create-group-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-1 rounded text-xs transition cursor-pointer">Create Group</button>
          </div>
        </details>

        <details class="text-xs text-slate-400 group">
          <summary class="cursor-pointer font-semibold text-indigo-400 select-none hover:text-indigo-300">⚙️ Profile Settings</summary>
          <div class="mt-2 space-y-2 pt-1">
            <input id="settings-username-input" type="text" placeholder="Update Display Name..." class="w-full bg-slate-700 border border-slate-600 rounded px-2 py-1 focus:outline-none text-white text-xs">
            <button id="save-settings-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-1 rounded text-xs transition cursor-pointer">Save Name</button>
          </div>
        </details>
      </div>

      <div class="p-3 border-b border-slate-700">
        <input id="search-input" type="text" placeholder="Search friends or groups..." class="w-full text-xs bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 focus:outline-none focus:border-indigo-500 text-white">
      </div>

      <div class="flex-1 overflow-y-auto p-2 space-y-4">
        <div>
          <h4 class="text-[11px] font-bold tracking-wider text-slate-400 uppercase px-2 mb-1">💬 Direct Channels</h4>
          <div id="users-list" class="space-y-1"></div>
        </div>
        <div>
          <h4 class="text-[11px] font-bold tracking-wider text-slate-400 uppercase px-2 mb-1">👥 Group Rooms</h4>
          <div id="groups-list" class="space-y-1"></div>
        </div>
      </div>
    </aside>

    <main id="chat-container" class="flex-1 flex flex-col justify-between bg-slate-900 h-full w-full absolute md:relative z-10 transition-transform duration-300 translate-x-full md:translate-x-0">
      
      <div class="bg-slate-800/40 border-b border-slate-700/80 p-3 flex items-center gap-3 overflow-x-auto select-none min-h-[75px] scrollbar-none">
        <div id="story-trigger-zone" class="flex flex-col items-center justify-center flex-shrink-0 cursor-pointer group">
          <div class="w-11 h-11 rounded-full bg-slate-700 group-hover:bg-indigo-600 border-2 border-dashed border-indigo-500 flex items-center justify-center transition">
            <span class="text-xl font-bold text-indigo-400 group-hover:text-white">+</span>
          </div>
          <span class="text-[10px] text-slate-400 mt-1">Post Story</span>
          <input type="file" id="story-file-input" class="hidden" accept="image/*">
        </div>
        <div class="h-8 w-[1px] bg-slate-700 flex-shrink-0"></div>
        <div id="stories-container" class="flex gap-3 items-center"></div>
      </div>

      <header class="bg-slate-800/80 p-4 border-b border-slate-700 flex items-center gap-3 shadow-sm">
        <button id="mobile-back-btn" class="md:hidden text-xs bg-slate-700 hover:bg-slate-600 text-slate-200 px-3 py-1.5 rounded-lg transition font-medium cursor-pointer">
          ⬅ Back
        </button>
        <h2 id="active-chat-partner" class="font-bold text-sm md:text-base text-slate-200 truncate">Select a channel to get started</h2>
      </header>

      <div id="chat-box" class="flex-1 p-4 md:p-6 overflow-y-auto space-y-3 bg-slate-900/40">
        <div class="text-center text-slate-500 mt-10 text-sm">No conversation channel is active.</div>
      </div>

      <footer class="p-4 bg-slate-800/40 border-t border-slate-700">
        <form id="chat-form" class="flex items-center gap-2 max-w-5xl mx-auto relative">
          <label class="p-3 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl transition cursor-pointer flex-shrink-0" title="Attach file or media">
            📎
            <input type="file" id="chat-file-input" class="hidden" disabled>
          </label>
          
          <input id="message-input" type="text" disabled placeholder="Select a dynamic channel first..." autocomplete="off" class="flex-1 bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500 text-sm disabled:opacity-50 text-white">
          <button type="submit" id="send-btn" disabled class="bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 text-white font-medium px-5 py-3 rounded-xl transition text-sm cursor-pointer">Send</button>
        </form>
        <div id="file-preview-indicator" class="text-xs text-indigo-400 mt-1 ml-14 hidden truncate max-w-md"></div>
      </footer>
    </main>
  </div>

  <div id="story-modal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden" onclick="closeStoryModal()">
    <div class="relative max-w-lg w-full p-4 flex flex-col items-center">
      <p id="story-modal-user" class="text-indigo-400 font-bold mb-2 text-sm"></p>
      <img id="story-modal-img" src="" class="max-h-[80vh] rounded-lg object-contain shadow-2xl">
      <p class="text-slate-500 text-xs mt-3">Click anywhere to return to panel</p>
    </div>
  </div>

  <script>
    let currentUser = { id: 'usr-me', username: 'ephrem74', avatar_url: '' };
    let activePartnerId = null;  
    let activeGroupId = null;    
    let pendingAttachedFile = null;

    // Local simulated datastore shared across identities
    let fallbackDataStore = {
      profiles: [
        { id: 'usr-me', username: 'ephrem74', avatar_url: '' },
        { id: 'usr-1', username: 'husendawit4', avatar_url: '' },
        { id: 'usr-2', username: 'alex_designer', avatar_url: '' }
      ],
      groups: [
        { id: 'grp-1', name: 'UI Dev Team Workspace', created_by: 'usr-me' }
      ],
      private_messages: [
        { id: 101, sender_id: 'usr-1', receiver_id: 'usr-me', content: 'Hey there!', file_url: null },
        { id: 102, sender_id: 'usr-me', receiver_id: 'usr-1', content: 'Hi, what are you working on?', file_url: null }
      ],
      group_messages: [],
      stories: [
        { id: 1, username: 'husendawit4', image_url: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150' }
      ]
    };

    // DOM Target Bindings
    const sidebarContainer = document.getElementById('sidebar-container');
    const chatContainer = document.getElementById('chat-container');
    const mobileBackBtn = document.getElementById('mobile-back-btn');
    const identitySandboxSelector = document.getElementById('identity-sandbox-selector');
    
    const currentUserDisplay = document.getElementById('current-user-display');
    const userAvatarPlaceholder = document.getElementById('user-avatar-placeholder');
    const avatarFileInput = document.getElementById('avatar-file-input');
    const logoutBtn = document.getElementById('logout-btn');
    const searchInput = document.getElementById('search-input');
    const usersList = document.getElementById('users-list');
    const groupsList = document.getElementById('groups-list');
    
    const groupNameInput = document.getElementById('group-name-input');
    const groupMembersInput = document.getElementById('group-members-input');
    const createGroupBtn = document.getElementById('create-group-btn');
    
    const settingsUsernameInput = document.getElementById('settings-username-input');
    const saveSettingsBtn = document.getElementById('save-settings-btn');

    const storyTriggerZone = document.getElementById('story-trigger-zone');
    const storiesContainer = document.getElementById('stories-container');
    const storyFileInput = document.getElementById('story-file-input');
    
    const activeChatPartner = document.getElementById('active-chat-partner');
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const chatFileInput = document.getElementById('chat-file-input');
    const filePreviewIndicator = document.getElementById('file-preview-indicator');
    const sendBtn = document.getElementById('send-btn');

    function runCoreAppBoot() {
      currentUserDisplay.textContent = currentUser.username;
      settingsUsernameInput.value = currentUser.username;
      userAvatarPlaceholder.textContent = currentUser.username[0].toUpperCase();

      renderSidebarFeeds();
      loadStoriesFeed();
    }

    // Persona Switcher Engine 
    identitySandboxSelector.addEventListener('change', (e) => {
      const chosenId = e.target.value;
      const targetProfile = fallbackDataStore.profiles.find(p => p.id === chosenId);
      
      if (targetProfile) {
        currentUser = { id: targetProfile.id, username: targetProfile.username, avatar_url: targetProfile.avatar_url };
        currentUserDisplay.textContent = currentUser.username;
        settingsUsernameInput.value = currentUser.username;
        
        if (currentUser.avatar_url) {
          userAvatarPlaceholder.innerHTML = `<img src="${currentUser.avatar_url}" class="w-full h-full object-cover">`;
        } else {
          userAvatarPlaceholder.innerHTML = currentUser.username[0].toUpperCase();
        }

        // Keep the chat room active, but reload history with the new identity context applied
        if (activePartnerId || activeGroupId) {
          loadActiveMessages();
        }

        renderSidebarFeeds();
        returnToSidebarView();
      }
    });

    // Mobile View Sliders
    function transitionToChatView() {
      if (window.innerWidth < 768) {
        sidebarContainer.classList.add('-translate-x-full');
        chatContainer.classList.remove('translate-x-full');
        chatContainer.classList.add('translate-x-0');
      }
    }

    function returnToSidebarView() {
      if (window.innerWidth < 768) {
        sidebarContainer.classList.remove('-translate-x-full');
        sidebarContainer.classList.add('translate-x-0');
        chatContainer.classList.remove('translate-x-0');
        chatContainer.classList.add('translate-x-full');
      }
    }

    mobileBackBtn.addEventListener('click', returnToSidebarView);

    // Sidebar Renders
    function renderSidebarFeeds() {
      const term = searchInput.value.trim().toLowerCase();
      usersList.innerHTML = '';
      groupsList.innerHTML = '';

      fallbackDataStore.profiles.forEach(p => {
        if (p.id === currentUser.id) return; // Hide self from contacts list
        if (term && !p.username.toLowerCase().includes(term)) return;

        const btn = document.createElement('button');
        btn.className = `w-full text-left p-2.5 rounded-xl transition flex items-center justify-between hover:bg-slate-700/40 cursor-pointer ${activePartnerId === p.id ? 'bg-indigo-600/30 text-indigo-300' : ''}`;
        
        const imgHTML = p.avatar_url ? `<img src="${p.avatar_url}" class="w-7 h-7 rounded-full object-cover">` : `<div class="w-7 h-7 rounded-full bg-slate-600 flex items-center justify-center text-xs font-bold uppercase">${p.username[0]}</div>`;
        
        btn.innerHTML = `
          <div class="flex items-center gap-3 overflow-hidden">
            ${imgHTML}
            <span class="font-medium text-xs truncate">${p.username}</span>
          </div>
          <span class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0 ml-2 shadow-sm"></span>
        `;
        btn.onclick = () => selectDirectChat(p);
        usersList.appendChild(btn);
      });

      fallbackDataStore.groups.forEach(g => {
        if (term && !g.name.toLowerCase().includes(term)) return;
        const btn = document.createElement('button');
        btn.className = `w-full text-left p-2.5 rounded-xl transition flex items-center gap-3 hover:bg-slate-700/40 cursor-pointer ${activeGroupId === g.id ? 'bg-emerald-600/30 text-emerald-300' : ''}`;
        btn.innerHTML = `<div class="w-7 h-7 rounded-full bg-emerald-700 flex items-center justify-center text-xs font-bold">#</div><span class="font-medium text-xs truncate">${g.name}</span>`;
        btn.onclick = () => selectGroupChat(g);
        groupsList.appendChild(btn);
      });
    }

    searchInput.addEventListener('input', renderSidebarFeeds);

    // Profile Setup Updates
    saveSettingsBtn.addEventListener('click', () => {
      const newUsername = settingsUsernameInput.value.trim();
      if (!newUsername) return alert("Username cannot be empty");

      currentUser.username = newUsername;
      currentUserDisplay.textContent = newUsername;
      
      const profileInStore = fallbackDataStore.profiles.find(p => p.id === currentUser.id);
      if (profileInStore) profileInStore.username = newUsername;

      const selectionOption = identitySandboxSelector.querySelector(`option[value="${currentUser.id}"]`);
      if (selectionOption) selectionOption.textContent = `${newUsername} ${currentUser.id === 'usr-me' ? '(You)' : ''}`;

      alert("Display settings saved!");
      renderSidebarFeeds();
    });

    avatarFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        userAvatarPlaceholder.innerHTML = `<img src="${event.target.result}" class="w-full h-full object-cover">`;
        currentUser.avatar_url = event.target.result;
        const pStore = fallbackDataStore.profiles.find(p => p.id === currentUser.id);
        if (pStore) pStore.avatar_url = event.target.result;
        renderSidebarFeeds();
      };
      reader.readAsDataURL(file);
    });

    // Chat Selection Handlers
    function selectDirectChat(profile) {
      activeGroupId = null;
      activePartnerId = profile.id;
      activeChatPartner.textContent = `💬 ${profile.username}`;
      enableInputs(`Message ${profile.username}...`);
      loadActiveMessages();
      transitionToChatView();
      renderSidebarFeeds();
    }

    function selectGroupChat(group) {
      activePartnerId = null;
      activeGroupId = group.id;
      activeChatPartner.textContent = `👥 Group: ${group.name}`;
      enableInputs(`Message group workspace...`);
      loadActiveMessages();
      transitionToChatView();
      renderSidebarFeeds();
    }

    function enableInputs(placeholderText) {
      messageInput.removeAttribute('disabled');
      chatFileInput.removeAttribute('disabled');
      sendBtn.removeAttribute('disabled');
      messageInput.placeholder = placeholderText;
    }

    // Fixed Messaging Rendering Loop Engine
    function loadActiveMessages() {
      chatBox.innerHTML = '';
      let records = [];

      if (activePartnerId) {
        // Matches messages sent from current identity to partner OR from partner to current identity
        records = fallbackDataStore.private_messages.filter(m => 
          (m.sender_id === currentUser.id && m.receiver_id === activePartnerId) ||
          (m.sender_id === activePartnerId && m.receiver_id === currentUser.id)
        );
      } else if (activeGroupId) {
        records = fallbackDataStore.group_messages.filter(m => m.group_id === activeGroupId);
      }

      if (records.length > 0) {
        records.forEach(appendMessageRow);
      } else {
        chatBox.innerHTML = `<div class="text-center text-slate-500 mt-10 text-xs">No previous tracking history records found here. Say Hello!</div>`;
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendMessageRow(msg) {
      const isMe = msg.sender_id === currentUser.id;
      const row = document.createElement('div');
      row.className = `w-full flex flex-col ${isMe ? 'items-end' : 'items-start'}`;

      let mediaPayload = '';
      if (msg.file_url) {
        mediaPayload = `<img src="${msg.file_url}" class="max-w-xs max-h-48 rounded-lg mb-1 mt-1 object-cover border border-slate-600 block">`;
      }

      let identityTag = '';
      if (!isMe) {
        const senderProfile = fallbackDataStore.profiles.find(p => p.id === msg.sender_id);
        if (senderProfile) {
          identityTag = `<span class="block text-[10px] text-slate-400 font-semibold mb-0.5 px-1">${senderProfile.username}</span>`;
        }
      }

      row.innerHTML = `
        ${identityTag}
        <div class="max-w-[85%] md:max-w-[70%] px-4 py-2 my-0.5 rounded-2xl text-xs shadow-sm ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-700 text-slate-100 rounded-tl-none'}">
          ${msg.content ? `<div>${msg.content}</div>` : ''}
          ${mediaPayload}
        </div>
      `;
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Input Submission Fix
    chatFileInput.addEventListener('change', (e) => {
      pendingAttachedFile = e.target.files[0];
      if (pendingAttachedFile) {
        filePreviewIndicator.textContent = `📎 Ready to attach: ${pendingAttachedFile.name}`;
        filePreviewIndicator.classList.remove('hidden');
      }
    });

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text && !pendingAttachedFile) return;

      messageInput.value = '';
      let fileDataUrl = null;

      if (pendingAttachedFile) {
        fileDataUrl = URL.createObjectURL(pendingAttachedFile);
        filePreviewIndicator.classList.add('hidden');
        pendingAttachedFile = null;
      }

      const msgObj = {
        id: Date.now(),
        sender_id: currentUser.id,
        content: text,
        file_url: fileDataUrl
      };

      if (activePartnerId) {
        msgObj.receiver_id = activePartnerId;
        fallbackDataStore.private_messages.push(msgObj);
      } else if (activeGroupId) {
        msgObj.group_id = activeGroupId;
        fallbackDataStore.group_messages.push(msgObj);
      }

      // Live redraw the view to confirm injection updates
      loadActiveMessages();
    });

    // Stories Feed Handlers
    storyTriggerZone.addEventListener('click', () => { storyFileInput.click(); });

    function loadStoriesFeed() {
      storiesContainer.innerHTML = '';
      fallbackDataStore.stories.forEach(story => {
        const block = document.createElement('div');
        block.className = 'flex flex-col items-center flex-shrink-0 cursor-pointer text-center';
        block.innerHTML = `
          <div class="w-12 h-12 rounded-full p-[2px] bg-gradient-to-tr from-yellow-400 to-purple-600 border border-slate-900 overflow-hidden shadow-md">
            <img src="${story.image_url}" class="w-full h-full object-cover rounded-full">
          </div>
          <span class="text-[9px] text-slate-300 mt-1 max-w-[55px] truncate block">${story.username}</span>
        `;
        block.onclick = () => openStoryModal(story);
        storiesContainer.appendChild(block);
      });
    }

    storyFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const newStory = {
          id: Date.now(),
          user_id: currentUser.id,
          username: currentUser.username,
          image_url: event.target.result
        };
        fallbackDataStore.stories.push(newStory);
        loadStoriesFeed();
      };
      reader.readAsDataURL(file);
    });

    function openStoryModal(story) {
      document.getElementById('story-modal-user').textContent = `Posted by @${story.username}`;
      document.getElementById('story-modal-img').src = story.image_url;
      document.getElementById('story-modal').classList.remove('hidden');
    }

    function closeStoryModal() {
      document.getElementById('story-modal').classList.add('hidden');
    }

    createGroupBtn.addEventListener('click', () => {
      const name = groupNameInput.value.trim();
      if (!name) return alert("Please specify a group room name!");

      const newGroupObj = { id: 'grp-' + Date.now(), name: name, created_by: currentUser.id };
      fallbackDataStore.groups.push(newGroupObj);
      
      groupNameInput.value = '';
      groupMembersInput.value = '';
      alert(`Group Room "${name}" provisioned successfully!`);
      renderSidebarFeeds();
    });

    logoutBtn.addEventListener('click', () => {
      alert("Mock session logged out. Reloading system view.");
      window.location.reload();
    });

    runCoreAppBoot();
  </script>
</body>
</html>

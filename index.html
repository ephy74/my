<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Web Chat</title>
  <!-- Tailwind CSS for modern styling -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex flex-col justify-between font-sans">

  <!-- Chat Header -->
  <header class="bg-slate-800 p-4 shadow-md flex justify-between items-center border-b border-slate-700">
    <h1 class="text-xl font-bold tracking-wide text-indigo-400">⚡ LiveChat</h1>
    <input id="username" type="text" value="User Guest" class="bg-slate-700 border border-slate-600 rounded px-3 py-1 text-sm focus:outline-none focus:border-indigo-500 w-36">
  </header>

  <!-- Messages Box -->
  <main id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3 max-w-4xl mx-auto w-full">
    <!-- Messages will dynamically appear here -->
  </main>

  <!-- Input Footer -->
  <footer class="bg-slate-800 p-4 border-t border-slate-700 max-w-4xl mx-auto w-full rounded-t-xl shadow-lg">
    <form id="chat-form" class="flex gap-2">
      <input id="message-input" type="text" placeholder="Type a message..." autocomplete="off" class="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-indigo-500">
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-5 py-2 rounded-lg transition shadow-md">Send</button>
    </form>
  </footer>

  <script>
    // REPLACE THESE with your actual Supabase credentials from settings
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const usernameInput = document.getElementById('username');

    // 1. Function to display a single message block cleanly
    function appendMessage(msg) {
      const isMe = usernameInput.value === msg.username;
      const msgDiv = document.createElement('div');
      msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
      
      msgDiv.innerHTML = `
        <span class="text-xs text-slate-400 mb-0.5">${msg.username}</span>
        <div class="max-w-[75%] px-4 py-2 rounded-2xl text-sm ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-700 text-slate-100 rounded-tl-none'}">
          ${msg.content}
        </div>
      `;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight; // Auto scroll to bottom
    }

    // 2. Load past messages on startup
    async function loadMessages() {
      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .order('id', { ascending: true })
        .limit(50);
      
      if (data) data.forEach(appendMessage);
    }

    // 3. Send message to database
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = messageInput.value.trim();
      if (!text) return;

      messageInput.value = '';

      await supabase.from('messages').insert([
        { username: usernameInput.value || 'Anonymous', content: text }
      ]);
    });

    // 4. Listen to Realtime updates (This acts like WebSockets)
    supabase
      .channel('public:messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        appendMessage(payload.new);
      })
      .subscribe();

    // Initial setup
    loadMessages();
  </script>
</body>
</html>
